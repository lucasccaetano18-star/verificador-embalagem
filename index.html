<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificador de Embalagem v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .cam-wrap {
            position: relative;
            flex: 1;
            overflow: hidden;
            touch-action: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 芒聰聙芒聰聙 Zones 芒聰聙芒聰聙 */
        .zone {
            position: absolute;
            border: 2.5px dashed;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 6px;
            touch-action: none;
            min-width: 80px;
            min-height: 70px;
        }

        .zone-1 { border-color: #f97316; background: rgba(249,115,22,0.12); }
        .zone-2 { border-color: #3b82f6; background: rgba(59,130,246,0.12); }
        .zone.ok   { border-style: solid; border-color: #22c55e; background: rgba(34,197,94,0.15); }
        .zone.fail { border-style: solid; border-color: #ef4444; background: rgba(239,68,68,0.15); }

        .zone-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            pointer-events: none;
        }
        .zone-1 .zone-label { color: #fb923c; }
        .zone-2 .zone-label { color: #60a5fa; }

        .zone-icon { font-size: 22px; pointer-events: none; }
        .zone-hint { font-size: 9px; color: rgba(255,255,255,0.45); pointer-events: none; }

        /* 芒聰聙芒聰聙 Result overlay 芒聰聙芒聰聙 */
        .result-overlay {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.78);
            gap: 10px;
        }
        .result-overlay.show { display: flex; }
        .res-icon { font-size: 72px; }
        .res-text { font-size: 26px; font-weight: 800; text-align: center; }
        .res-text.ok   { color: #22c55e; }
        .res-text.fail { color: #ef4444; }
        .res-sub  { font-size: 14px; color: #aaa; text-align: center; }

        /* 芒聰聙芒聰聙 Panel 芒聰聙芒聰聙 */
        .panel {
            background: #111;
            padding: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #1e1e1e;
        }

        .phase-label {
            font-size: 11px;
            color: #555;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Status cards */
        .status-row { display: flex; gap: 8px; }

        .zone-card {
            flex: 1;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 8px 10px;
            border: 1px solid #252525;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color .3s, background .3s;
        }
        .zone-card.ok   { border-color: #22c55e; background: rgba(34,197,94,0.07); }
        .zone-card.fail { border-color: #ef4444; background: rgba(239,68,68,0.07); }

        .dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background .3s;
        }
        .d1 { background: #f97316; }
        .d2 { background: #3b82f6; }
        .dot.ok   { background: #22c55e; }
        .dot.fail { background: #ef4444; }

        .card-text { font-size: 11px; line-height: 1.3; }
        .card-title { font-weight: 700; color: #ccc; }
        .card-state { color: #555; margin-top: 1px; }
        .card-state.ok   { color: #22c55e; }
        .card-state.fail { color: #ef4444; }
        .card-state.cal  { color: #888; }

        /* Buttons */
        .actions { display: flex; gap: 8px; }

        .btn {
            flex: 1;
            padding: 12px 6px;
            border-radius: 11px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }
        .btn:active { transform: scale(.96); }
        .btn:disabled { opacity: .3; cursor: not-allowed; }
        .btn-orange { background: #f97316; color: #fff; }
        .btn-blue   { background: #3b82f6; color: #fff; }
        .btn-red    { background: #ef4444; color: #fff; }
        .btn-gray   { background: #2a2a2a; color: #888; }

        /* Sensitivity */
        .sens-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sens-row label { font-size: 11px; color: #444; white-space: nowrap; }
        .sens-row input { flex: 1; accent-color: #3b82f6; height: 3px; }
        .sens-val { font-size: 11px; color: #555; width: 18px; text-align: right; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .pulse { animation: pulse 1.2s infinite; }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="cam-wrap" id="camWrap">
    <video id="video" autoplay playsinline muted></video>

    <div class="zone zone-1" id="zone1" style="left:8%;top:8%;width:36%;height:38%">
        <div class="zone-label">ZONA 1 芒聙聰 KIT</div>
        <div class="zone-icon" id="icon1">冒聼聯娄</div>
        <div class="zone-hint">arrastar</div>
    </div>

    <div class="zone zone-2" id="zone2" style="left:56%;top:8%;width:36%;height:38%">
        <div class="zone-label">ZONA 2 芒聙聰 CAIXA</div>
        <div class="zone-icon" id="icon2">冒聼聯芦</div>
        <div class="zone-hint">arrastar</div>
    </div>

    <div class="result-overlay" id="resOverlay">
        <div class="res-icon" id="resIcon"></div>
        <div class="res-text" id="resText"></div>
        <div class="res-sub"  id="resSub"></div>
    </div>
</div>

<div class="panel">
    <div class="phase-label" id="phaseLabel">Posicione as zonas e calibre</div>

    <div class="status-row">
        <div class="zone-card" id="card1">
            <div class="dot d1" id="dot1"></div>
            <div class="card-text">
                <div class="card-title">Kit na mesa</div>
                <div class="card-state" id="state1">Aguardando calibra脙搂脙拢o</div>
            </div>
        </div>
        <div class="zone-card" id="card2">
            <div class="dot d2" id="dot2"></div>
            <div class="card-text">
                <div class="card-title">Kit na caixa</div>
                <div class="card-state" id="state2">Aguardando calibra脙搂脙拢o</div>
            </div>
        </div>
    </div>

    <div class="actions" id="actionRow">
        <button class="btn btn-orange" id="btnCal1" onclick="calibrateZone(1)">Calibrar Zona 1</button>
        <button class="btn btn-blue"   id="btnCal2" onclick="calibrateZone(2)" disabled>Calibrar Zona 2</button>
    </div>

    <div class="sens-row">
        <label>Sensibilidade</label>
        <input type="range" id="sens" min="1" max="10" value="6">
        <span class="sens-val" id="sensVal">6</span>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    let ref1 = null, ref2 = null;
    let z1ok = false, z2ok = false;
    let timer = null;
    let phase = 'setup';

    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const wrap    = document.getElementById('camWrap');
    const sensEl  = document.getElementById('sens');
    const sensValEl = document.getElementById('sensVal');

    sensEl.addEventListener('input', () => sensValEl.textContent = sensEl.value);

    (async () => {
        try {
            video.srcObject = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
            });
        } catch {
            try { video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true }); }
            catch { alert('C脙垄mera indispon脙颅vel. Verifique as permiss脙碌es.'); }
        }
    })();

    function makeDraggable(el) {
        let ox = 0, oy = 0;
        const move = (cx, cy) => {
            const wr = wrap.getBoundingClientRect();
            const er = el.getBoundingClientRect();
            let l = (cx - wr.left - ox) / wr.width * 100;
            let t = (cy - wr.top  - oy) / wr.height * 100;
            l = Math.max(0, Math.min(l, 100 - er.width  / wr.width  * 100));
            t = Math.max(0, Math.min(t, 100 - er.height / wr.height * 100));
            el.style.left = l + '%';
            el.style.top  = t + '%';
        };
        el.addEventListener('touchstart', e => {
            if (phase === 'monitoring') return;
            e.preventDefault();
            const r = el.getBoundingClientRect();
            ox = e.touches[0].clientX - r.left;
            oy = e.touches[0].clientY - r.top;
        }, { passive: false });
        el.addEventListener('touchmove', e => {
            if (phase === 'monitoring') return;
            e.preventDefault();
            move(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        el.addEventListener('mousedown', e => {
            if (phase === 'monitoring') return;
            e.preventDefault();
            ox = e.offsetX; oy = e.offsetY;
            const mm = ev => move(ev.clientX, ev.clientY);
            const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
            document.addEventListener('mousemove', mm);
            document.addEventListener('mouseup', mu);
        });
    }

    makeDraggable(document.getElementById('zone1'));
    makeDraggable(document.getElementById('zone2'));

    function capture(zoneEl) {
        const wr = wrap.getBoundingClientRect();
        const zr = zoneEl.getBoundingClientRect();
        canvas.width  = wr.width;
        canvas.height = wr.height;
        ctx.drawImage(video, 0, 0, wr.width, wr.height);
        const x = Math.max(0, zr.left - wr.left);
        const y = Math.max(0, zr.top  - wr.top);
        const w = Math.min(zr.width,  wr.width  - x);
        const h = Math.min(zr.height, wr.height - y);
        return ctx.getImageData(x, y, w, h);
    }

    function diff(a, b) {
        const d1 = a.data, d2 = b.data;
        const len = Math.min(d1.length, d2.length);
        let changed = 0, total = 0;
        for (let i = 0; i < len; i += 4) {
            if ((Math.abs(d1[i]-d2[i]) + Math.abs(d1[i+1]-d2[i+1]) + Math.abs(d1[i+2]-d2[i+2])) / 3 > 20)
                changed++;
            total++;
        }
        return (changed / total) * 100;
    }

    function threshold() {
        return 8 - (parseInt(sensEl.value) - 1) * 0.72;
    }

    function calibrateZone(n) {
        const el = document.getElementById('zone' + n);
        if (n === 1) {
            ref1 = capture(el);
            z1ok = false;
            setState(1, 'cal', 'Calibrado 芒聙聰 aguardando');
            document.getElementById('btnCal1').disabled = true;
            document.getElementById('btnCal2').disabled = false;
            setPhase('Agora calibre a Zona 2 (caixa com pe脙搂as, sem kit)');
        } else {
            ref2 = capture(el);
            z2ok = false;
            setState(2, 'cal', 'Calibrado 芒聙聰 aguardando');
            startMonitoring();
        }
        if (navigator.vibrate) navigator.vibrate([60, 30, 60]);
    }

    function startMonitoring() {
        phase = 'monitoring';
        setPhase('冒聼聼拢 Monitorando automaticamente...');
        document.getElementById('actionRow').innerHTML =
            `<button class="btn btn-red"  onclick="stopAndCheck()">Fechar caixa agora</button>
             <button class="btn btn-gray" onclick="resetAll()">芒聠潞 Reiniciar</button>`;
        document.getElementById('zone1').querySelector('.zone-hint').textContent = '';
        document.getElementById('zone2').querySelector('.zone-hint').textContent = '';
        timer = setInterval(check, 900);
    }

    function check() {
        const thr = threshold();
        if (ref1 && !z1ok) {
            if (diff(ref1, capture(document.getElementById('zone1'))) > thr) {
                z1ok = true; setZone(1, 'ok'); setState(1, 'ok', '芒聹聟 Kit pegou'); vib([80]);
            }
        }
        if (ref2 && !z2ok) {
            if (diff(ref2, capture(document.getElementById('zone2'))) > thr) {
                z2ok = true; setZone(2, 'ok'); setState(2, 'ok', '芒聹聟 Kit colocou'); vib([80]);
            }
        }
        if (z1ok && z2ok) { clearInterval(timer); showResult(true); }
    }

    function stopAndCheck() {
        clearInterval(timer);
        if (!z'lok) {
            if (!z1ok) { setZone(1, 'fail'); setState(1, 'fail', 'Kit ainda na mesa'); }
            setZone(2, 'fail'); setState(2, 'fail', '芒聺聦 Kit n脙拢o colocado');
            showResult(false);
        } else { showResult(true); }
    }

    function showResult(ok) {
        const ov = document.getElementById('resOverlay');
        ov.className = 'result-overlay show';
        document.getElementById('resIcon').textContent = ok ? '芒聹聟' : '冒聼職篓';
        const rt = document.getElementById('resText');
        rt.className = 'res-text ' + (ok ? 'ok' : 'fail');
        rt.textContent = ok ? 'EMBALAGEM OK' : 'KIT AUSENTE!';
        const rs = document.getElementById('resSub');
        if (ok) {
            rs.textContent = 'Kit detectado na caixa';
            vib([100, 50, 100]);
            setTimeout(() => { ov.className = 'result-overlay'; resetForNext(); }, 2500);
        } else {
            rs.innerHTML = 'Verifique antes de fechar a caixa<br>'
                + '<button onclick="resetForNext()" style="margin-top:14px;padding:10px 28px;border-radius:10px;background:#222;color:white;border:1px solid #444;font-size:14px;font-weight:700">Corrigir</button>';
            vib([600]);
        }
    }

    function resetForNext() {
        document.getElementById('resOverlay').className = 'result-overlay';
        z1ok = false; z2ok = false;
        setZone(1, ''); setZone(2, '');
        setState(1, 'cal', 'Aguardando...');
        setState(2, 'cal', 'Aguardando...');
        document.getElementById('icon1').textContent = '冒聼聯娄', document.getElementById('icon2').textContent = '冒聼聯芦';
        setPhase('冒聼聼拢 Monitorando 芒聙聰 pr脙鲁xima embalagem');
        timer = setInterval(check, 900);
    }

    function resetAll() {
        clearInterval(timer);
        ref1 = ref2 = null; z1ok = z2ok = false; phase = 'setup';
        document.getElementById('resOverlay').className = 'result-overlay';
        setZone(1, ''); setZone(2, '');
        setState(1, '', 'Aguardando calibra脙搂脙拢o');
        setState(2, '', 'Aguardando calibra脙搂脙拢o');
        document.getElementById('icon1').textContent = '冒聼聯娄';
        document.getElementById('icon2').textContent = '冒聼聯芦';
        document.getElementById('zone1').querySelector('.zone-hint').textContent = 'arrastar';
        document.getElementById('zone2').querySelector('.zone-hint').textContent = 'arrastar';
        document.getElementById('actionRow').innerHTML =
            `<button class="btn btn-orange" id="btnCal1" onclick="calibrateZone(1)">Calibrar Zona 1</button>
             <button class="btn btn-blue"   id="btnCal2" onclick="calibrateZone(2)" disabled>Calibrar Zona 2</button>`;
        setPhase('Posicione as zonas e calibre');
    }

    function setZone(n, state) {
        const z = document.getElementById('zone' + n);
        z.className = 'zone zone-' + n + (state ? ' ' + state : '');
        const icon = document.getElementById('icon' + n);
        if (state === 'ok') icon.textContent = '芒聹聟';
        else if (state === 'fail') icon.textContent = '冒聼職篓';
        else icon.textContent = n === 1 ? '冒聼聯娄' : '冒聼聯芦';
    }

    function setState(n, cls, text) {
        document.getElementById('dot' + n).className = 'dot ' + (cls === 'ok' ? 'ok' : cls === 'fail' ? 'fail' : 'd' + n);
        document.getElementById('card' + n).className = 'zone-card' + (cls === 'ok' ? ' ok' : cls === 'fail' ? ' fail' : '');
        const s = document.getElementById('state' + n);
        s.className = 'card-state' + (cls ? ' ' + cls : '');
        s.textContent = text;
    }

    function setPhase(t) { document.getElementById('phaseLabel').textContent = t; }
    function vib(p) { if (navigator.vibrate) navigator.vibrate(p); }
</script>
</body>
</html>
