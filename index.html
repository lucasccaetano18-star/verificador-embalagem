<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Verificador de Embalagem</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#startScreen{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:100;padding:32px;}
#startScreen h1{font-size:22px;font-weight:700;text-align:center;color:#fff;}
#startScreen p{font-size:14px;color:#aaa;text-align:center;max-width:280px;}
.start-btn{background:#2a7af5;color:#fff;border:none;border-radius:14px;padding:16px 40px;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:280px;}
#errScreen{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;padding:32px;display:none;}
#errScreen p{font-size:15px;color:#f55;text-align:center;}
.retry-btn{background:#333;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;cursor:pointer;}
#header{background:#1a1a1a;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#phaseLabel{font-size:12px;color:#aaa;flex:1;}
#sensWrap{display:flex;align-items:center;gap:6px;font-size:12px;color:#888;}
#sensV{font-size:12px;color:#aaa;}
input[type=range]{width:70px;height:4px;accent-color:#2a7af5;}
#cards{display:flex;gap:8px;padding:8px;flex-shrink:0;}
.zone-card{flex:1;background:#1e1e1e;border-radius:10px;padding:10px;border:1px solid #333;transition:border-color .3s;}
.zone-card.ok{border-color:#2a7;}
.zone-card.fail{border-color:#f55;}
.card-top{display:flex;align-items:center;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;background:#444;flex-shrink:0;transition:background .3s;}
.dot.ok{background:#2a7;}
.dot.fail{background:#f55;}
.dot.d1{background:#555;}
.dot.d2{background:#555;}
.card-title{font-size:13px;font-weight:600;}
.card-state{font-size:11px;color:#888;margin-top:4px;}
.card-state.ok{color:#2a7;}
.card-state.fail{color:#f55;}
.card-state.cal{color:#fa0;}
#camWrap{flex:1;position:relative;overflow:hidden;background:#000;}
video{width:100%;height:100%;object-fit:cover;}
.zone{position:absolute;border:2px dashed rgba(255,255,255,0.6);border-radius:6px;background:rgba(255,255,255,0.05);touch-action:none;cursor:move;min-width:60px;min-height:50px;}
.zone.ok{border:2px solid #2a7;background:rgba(40,170,100,0.15);}
.zone.fail{border:2px solid #f55;background:rgba(255,85,85,0.15);}
.zone-icon{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:18px;pointer-events:none;}
.zone-hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.5);pointer-events:none;white-space:nowrap;}
.rh{position:absolute;width:22px;height:22px;z-index:10;touch-action:none;cursor:nwse-resize;}
.rh-tl{top:-4px;left:-4px;cursor:nw-resize;}
.rh-tr{top:-4px;right:-4px;cursor:ne-resize;}
.rh-bl{bottom:-4px;left:-4px;cursor:sw-resize;}
.rh-br{bottom:-4px;right:-4px;cursor:se-resize;}
#actionRow{padding:8px;display:flex;gap:8px;flex-shrink:0;}
.btn{flex:1;padding:12px 8px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;}
.btn-orange{background:#e07000;}
.btn-blue{background:#2a7af5;}
.btn-red{background:#c0392b;}
.btn-gray{background:#444;}
.btn:disabled{opacity:0.4;cursor:default;}
,result-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.result-overlay.show{opacity:1;pointer-events:all;}
.res-icon{font-size:72px;}
.res-text{font-size:32px;font-weight:900;}
.res-text.ok{color:#2a7;}
.res-text.fail{color:#f55;}
.res-sub{font-size:14px;color:#aaa;text-align:center;}
</style>
</head>
<body>

<div id="startScreen">
  <div style="font-size:48px">&#128247;</div>
  <h1>Verificador de Embalagem</h1>
  <p>Posicione as zonas sobre a esteira e calibre para iniciar o monitoramento</p>
  <button class="start-btn" onclick="startCamera()">Iniciar cÃ¢mera</button>
</div>

<div id="errScreen">
  <div style="font-size:40px">&#9888;</div>
  <p id="errMsg">CÃ¢mera nÃ£o disponÃ­vel</p>
  <button class="retry-btn" onclick="retryCamera()">Tentar novamente</button>
</div>

<div id="header">
  <span id="phaseLabel">Aguardando cÃ¢mera...</span>
  <div id="sensWrap">
    <span>Sens</span>
    <input type="range" id="sens" min="1" max="10" value="5">
    <span id="sensV">5</span>
  </div>
</div>

<div id="cards">
  <div class="zone-card" id="card1">
    <div class="card-top">
      <div class="dot d1" id="dot1"></div>
      <span class="card-title">Zona 1</span>
    </div>
    <div class="card-state" id="state1">Aguardando calibraÃ§Ã£o</div>
  </div>
  <div class="zone-card" id="card2">
    <div class="card-top">
      <div class="dot d2" id="dot2"></div>
      <span class="card-title">Zona 2</span>
    </div>
    <div class="card-state" id="state2">Aguardando calibraÃ§Ã£o</div>
  </div>
</div>

<div id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <div class="zone" id="zone1" style="left:5%;top:20%;width:40f;height:55%">
    <div class="zone-icon" id="icon1">&#128294;</div>
    <div class="zone-hint" id="hint1">arrastar</div>
    <div class="rh rh-tl" data-corner="tl"></div>
    <div class="rh rh-tr" data-corner="tr"></div>
    <div class="rh rh-bl" data-corner="bl"></div>
    <div class="rh rh-br" data-corner="br"></div>
  </div>
  <div class="zone" id="zone2" style="left:55%;top:20%;width:40%;height:55%">
    <div class="zone-icon" id="icon2">&#128363;</div>
    <div class="zone-hint" id="hint2">arrastar</div>
    <div class="rh rh-tl" data-corner="tl"></div>
    <div class="rh rh-tr" data-corner="tr"></div>
    <div class="rh rh-bl" data-corner="bl"></div>
    <div class="rh rh-br" data-corner="br"></div>
  </div>
</div>

<div id="actionRow"></div>

<div class="result-overlay" id="resOverlay">
  <div class="res-icon" id="resIcon"></div>
  <div class="res-text" id="resText"></div>
  <div class="res-sub" id="resSub"></div>
</div>

<canvas id="canvas"></canvas>

<script>
(function() {
  var ref1 = null, ref2 = null, z1ok = false, z2ok = false;
  var timer = null, phase = 'setup';
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var wrap = document.getElementById('camWrap');
  var sensEl = document.getElementById('sens');

  sensEl.addEventListener('input', function() {
    document.getElementById('sensV').textContent = sensEl.value;
  });

  function startCamera() {
    document.getElementById('startScreen').style.display = 'none';
    var opts = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }, audio: false };
    navigator.mediaDevices.getUserMedia(opts).then(function(stream) {
      video.srcObject = stream;
      video.play();
      setPhase('Posicione as zonas e calibre');
      makeDraggable(document.getElementById('zone1'));
      makeDraggable(document.getElementById('zone2'));
      makeResizable(document.getElementById('zone1'));
      makeResizable(document.getElementById('zone2'));
      setActionRow('calibrate');
    }).catch(function(err) {
      showCameraError(err.message || 'Erro ao acessar cÃ¢mera');
    });
  }

  function showCameraError(msg) {
    document.getElementById('errMsg').textContent = msg || 'CÃ¢mera nÃ£o disponÃ­vel';
    document.getElementById('errScreen').style.display = 'flex';
  }

  function retryCamera() {
    document.getElementById('errScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
  }

  function makeDraggable(el) {
    var startX, startY, origL, origT;
    function moveStart(cx, cy) {
      var er = el.getBoundingClientRect();
      var wr = wrap.getBoundingClientRect();
      startX = cx; startY = cy;
      origL = er.left - wr.left;
      origT = er.top - wr.top;
    }
    function moveTo(cx, cy) {
      var wr = wrap.getBoundingClientRect();
      var dx = cx - startX, dy = cy - startY;
      var nl = Math.max(0, Math.min(wr.width - el.offsetWidth, origL + dx));
      var nt = Math.max(0, Math.min(wr.height - el.offsetHeight, origT + dy));
      el.style.left = (nl / wr.width * 100) + '%';
      el.style.top = (nt / wr.height * 100) + '%';
    }
    el.addEventListener('touchstart', function(e) {
      if (phase === 'monitoring') return;
      if (e.target.classList.contains('rh')) return;
      e.preventDefault();
      moveStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    el.addEventListener('touchmove', function(e) {
      if (phase === 'monitoring') return;
      e.preventDefault();
      moveTo(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    el.addEventListener('mousedown', function(e) {
      if (phase === 'monitoring') return;
      if (e.target.classList.contains('rh')) return;
      e.preventDefault();
      moveStart(e.clientX, e.clientY);
      function onMove(ev) { moveTo(ev.clientX, ev.clientY); }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  function makeResizable(el) {
    var handles = el.querySelectorAll('.rh');
    for (var i = 0; i < handles.length; i++) {
      attachResizeHandle(el, handles[i]);
    }
  }

  function attachResizeHandle(el, h) {
    var corner = h.dataset.corner;
    function onMove(cx, cy) {
      var wr = wrap.getBoundingClientRect();
      var er = el.getBoundingClientRect();
      var MIN = 60, MINH = 50;
      var left = er.left - wr.left;
      var top = er.top - wr.top;
      var right = er.right - wr.left;
      var bottom = er.bottom - wr.top;
      if (corner === 'br') { right = cx - wr.left; bottom = cy - wr.top; }
      if (corner === 'bl') { left = cx - wr.left; bottom = cy - wr.top; }
      if (corner === 'tr') { right = cx - wr.left; top = cy - wr.top; }
      if (corner === 'tl') { left = cx - wr.left; top = cy - wr.top; }
      if (right - left < MIN) { if (corner === 'bl' || corner === 'tl') { left = right - MIN; } else { right = left + MIN; } }
      if (bottom - top < MINH) { if (corner === 'tl' || corner === 'tr') { top = bottom - MINH; } else { bottom = top + MINH; } }
      left = Math.max(0, left); top = Math.max(0, top);
      right = Math.min(wr.width, right); bottom = Math.min(wr.height, bottom);
      el.style.left = (left / wr.width * 100) + '%';
      el.style.top = (top / wr.height * 100) + '%';
      el.style.width = ((right - left) / wr.width * 100) + '%';
      el.style.height = ((bottom - top) / wr.height * 100) + '%';
    }
    h.addEventListener('touchstart', function(e) {
      if (phase === 'monitoring') return;
      e.preventDefault(); e.stopPropagation();
    }, { passive: false });
    h.addEventListener('touchmove', function(e) {
      if (phase === 'monitoring') return;
      e.preventDefault(); e.stopPropagation();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    h.addEventListener('mousedown', function(e) {
      if (phase === 'monitoring') return;
      e.preventDefault(); e.stopPropagation();
      function onMm(ev) { onMove(ev.clientX, ev.clientY); }
      function onMu() {
        document.removeEventListener('mousemove', onMm);
        document.removeEventListener('mouseup', onMu);
      }
      document.addEventListener('mousemove', onMm);
      document.addEventListener('mouseup', onMu);
    });
  }

  function capture(zoneEl) {
    var wr = wrap.getBoundingClientRect();
    var zr = zoneEl.getBoundingClientRect();
    var sw = Math.round((zr.width / wr.width) * video.videoWidth);
    var sh = Math.round((zr.height / wr.height) * video.videoHeight);
    var sx = Math.round(((zr.left - wr.left) / wr.width) * video.videoWidth);
    var sy = Math.round(((zr.top - wr.top) / wr.height) * video.videoHeight);
    if (sw < 1 || sh < 1) return null;
    canvas.width = sw; canvas.height = sh;
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
    return ctx.getImageData(0, 0, sw, sh);
  }

  function pixelDiff(a, b) {
    if (!a || !b || a.data.length !== b.data.length) return 0;
    var diff = 0, len = a.data.length;
    for (var i = 0; i < len; i += 4) {
      diff += Math.abs(a.data[i] - b.data[i]);
      diff += Math.abs(a.data[i+1] - b.data[i+1]);
      diff += Math.abs(a.data[i+2] - b.data[i+2]);
    }
    return diff / (len / 4);
  }

  function threshold() {
    return 8 - (parseInt(sensEl.value) - 1) * 0.72;
  }

  function calibrateZone(n) {
    if (n === 1) {
      ref1 = capture(document.getElementById('zone1'));
      setZone(1, 'cal'); setState(1, 'cal', 'Zona 1 calibrada');
      document.getElementById('icon1').textContent = 'OK';
      document.getElementById('btnCal2').disabled = false;
    } else {
      ref2 = capture(document.getElementById('zone2'));
      setZone(2, 'cal'); setState(2, 'cal', 'Zona 2 calibrada');
      document.getElementById('icon2').textContent = 'OK';
      startMonitoring();
    }
  }

  function startMonitoring() {
    phase = 'monitoring';
    setPhase('Monitorando automaticamente...');
    document.getElementById('hint1').textContent = '';
    document.getElementById('hint2').textContent = '';
    setActionRow('monitoring');
    timer = window.setInterval(check, 900);
  }

  function check() {
    var thr = threshold();
    var z1 = document.getElementById('zone1');
    var z2 = document.getElementById('zone2');
    if (ref1 && !z1ok && pixelDiff(ref1, capture(z1)) > thr) {
      z1ok = true; setZone(1, 'ok'); setState(1, 'ok', 'Kit pegou'); vib([80]);
    }
    if (ref2 && !z2ok && pixelDiff(ref2, capture(z2)) > thr) {
      z2ok = true; setZone(2, 'ok'); setState(2, 'ok', 'Kit colocou'); vib([80]);
    }
    if (z1ok && z2ok) {
      window.clearInterval(timer);
      showResult(true);
    }
  }

  function stopAndCheck() {
    window.clearInterval(timer);
    if (!z2ok) {
      if (!z1ok) { setZone(1, 'fail'); setState(1, 'fail', 'Kit ainda na mesa'); }
      setZone(2, 'fail'); setState(2, 'fail', 'Kit nÃ£o colocado');
      showResult(false);
    } else {
      showResult(true);
    }
  }

  function showResult(ok) {
    var ov = document.getElementById('resOverlay');
    ov.className = 'result-overlay show';
    document.getElementById('resIcon').textContent = ok ? 'â' : 'â';
    var rt = document.getElementById('resText');
    rt.className = 'res-text ' + (ok ? 'ok' : 'fail');
    rt.textContent = ok ? 'EMBALAGEM OK' : 'KIT AUSENTE!';
    var rs = document.getElementById('resSub');
    if (ok) {
      rs.textContent = 'Kit detectado na caixa';
      vib([100, 50, 100]);
      window.setTimeout(function() { ov.className = 'result-overlay'; resetForNext(); }, 2500);
    } else {
      rs.innerHTML = 'Verifique antes de fechar<br><button onclick="window._app.resetForNext()" style="margin-top:14px;padding:10px 28px;border-radius:10px;background:#222;color:white;border:1px solid #444;font-size:14px;font-weight:700">Corrigir</button>';
      vib([600]);
    }
  }

  function resetForNext() {
    document.getElementById('resOverlay').className = 'result-overlay';
    z1ok = false; z2ok = false;
    setZone(1, ''); setZone(2, '');
    setState(1, 'cal', 'Aguardando...');
    setState(2, 'cal', 'Aguardando...');
    document.getElementById('icon1').textContent = '\u{1F526}';
    document.getElementById('icon2').textContent = '\u{1F56B}';
    setPhase('Monitorando - prÃ³xima embalagem');
    timer = window.setInterval(check, 900);
  }

  function resetAll() {
    window.clearInterval(timer);
    ref1 = null; ref2 = null;
    z1ok = false; z2ok = false;
    phase = 'setup';
    document.getElementById('resOverlay').className = 'result-overlay';
    setZone(1, ''); setZone(2, '');
    setState(1, '', 'Aguardando calibraÃ§Ã£o');
    setState(2, '', 'Aguardando calibraÃ§Ã£o');
    document.getElementById('icon1').textContent = '\u{1F526}';
    document.getElementById('icon2').textContent = '\u{1F56B}';
    document.getElementById('hint1').textContent = 'arrastar';
    document.getElementById('hint2').textContent = 'arrastar';
    setPhase('Posicione as zonas e calibre');
    setActionRow('calibrate');
  }

  function setActionRow(mode) {
    var row = document.getElementById('actionRow');
    if (mode === 'calibrate') {
      row.innerHTML = '<button class="btn btn-orange" id="btnCal1" onclick="window._app.calibrateZone(1)">Calibrar Zona 1</button><button class="btn btn-blue" id="btnCal2" onclick="window._app.calibrateZone(2)" disabled>Calibrar Zona 2</button>';
    } else {
      row.innerHTML = '<button class="btn btn-red" onclick="window._app.stopAndCheck()">Fechar caixa agora</button><button class="btn btn-gray" onclick="window._app.resetAll()">Reiniciar</button>';
    }
  }

  function setZone(n, state) {
    var z = document.getElementById('zone' + n);
    z.className = 'zone' + (state ? ' ' + state : '');
    var icon = document.getElementById('icon' + n);
    if (state === 'ok') icon.textContent = 'OK';
    else if (state === 'fail') icon.textContent = '!';
    else if (state === 'cal') icon.textContent = 'OK';
    else icon.textContent = n === 1 ? '\u{1F526}' : '\u{1F56B}';
  }

  function setState(n, cls, text) {
    var dot = document.getElementById('dot' + n);
    dot.className = 'dot ' + (cls === 'ok' ? 'ok' : cls === 'fail' ? 'fail' : 'd' + n);
    var card = document.getElementById('card' + n);
    card.className = 'zone-card' + (cls === 'ok' ? ' ok' : cls === 'fail' ? ' fail' : '');
    var s = document.getElementById('state' + n);
    s.className = 'card-state' + (cls ? ' ' + cls : '');
    s.textContent = text;
  }

  function setPhase(t) {
    document.getElementById('phaseLabel').textContent = t;
  }

  function vib(p) {
    if (navigator.vibrate) navigator.vibrate(p);
  }

  // Expose needed functions globally for inline onclick handlers
  window._app = {
    calibrateZone: calibrateZone,
    stopAndCheck: stopAndCheck,
    resetAll: resetAll,
    resetForNext: resetForNext
  };

  // Override startCamera for global access
  window.startCamera = startCamera;
  window.retryCamera = retryCamera;
})();
</script>
</body>
</html>
